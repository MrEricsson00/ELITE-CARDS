<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Elit Cards</title>
    <meta name="description" content="Create your Elit Cards account">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="__className_f367f3 bg-white text-black min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            <!-- Header Section -->
            <div class="text-center mb-8">
                <img alt="Logo" loading="lazy" width="80" height="80" decoding="async" class="h-20 w-20 mx-auto mb-4" src="logo.jpeg"/>
                <h1 class="text-2xl md:text-3xl font-bold text-blue-600">Create a Elit Cards Account</h1>
            </div>

            <!-- Sign Up Form -->
            <form class="space-y-4" id="signup-form">
                <!-- First Name -->
                <div>
                    <input
                        type="text"
                        id="firstname"
                        name="firstname"
                        placeholder="Enter Firstname"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Last Name -->
                <div>
                    <input
                        type="text"
                        id="lastname"
                        name="lastname"
                        placeholder="Enter Lastname"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Username -->
                <div>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter Username"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Email -->
                <div>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter Email"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Password -->
                <div>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter Password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Confirm Password -->
                <div>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        placeholder="Confirm Password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                        required
                    />
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-3 px-4 rounded-lg transition-colors"
                >
                    Create
                </button>
            </form>

            <!-- Legal Text -->
            <div class="mt-6 text-center text-sm text-gray-600">
                <p>
                    By signing up, you agree to our
                    <a href="/privacy-policy" class="text-cyan-500 hover:text-cyan-600">Privacy Policy</a>,
                    <a href="/cookie-policy" class="text-cyan-500 hover:text-cyan-600">Cookie Policy</a>, and
                    <a href="/member-agreement" class="text-cyan-500 hover:text-cyan-600">Member Agreement</a>
                </p>
            </div>

            <!-- Already Registered Link -->
            <div class="mt-8 text-center">
                <p class="text-gray-600">
                    Already having an account?
                    <a href="login.html" class="text-cyan-500 hover:text-cyan-600 font-medium">Login.</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Handle signup form submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstname = document.getElementById('firstname').value;
            const lastname = document.getElementById('lastname').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            console.log('Signup form submitted with email:', email);

            // Check password match
            if (password !== confirmPassword) {
                console.log('Password mismatch detected');
                alert('Passwords do not match. Please try again.');
                return;
            }

            // Email domain validation
            const emailParts = email.split('@');
            if (emailParts.length !== 2) {
                console.log('Invalid email format');
                alert('Please enter a valid email account.');
                return;
            }
            const domain = emailParts[1].toLowerCase();
            const allowedDomains = ['gmail.com', 'icloud.com', 'yahoo.com'];
            if (!allowedDomains.includes(domain)) {
                console.log('Email domain not allowed:', domain);
                alert('Please enter a valid email account.');
                return;
            }

            try {
                // Create user with Firebase Auth
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Update display name
                await user.updateProfile({
                    displayName: `${firstname} ${lastname}`
                });

                console.log('User created successfully with Firebase');
                alert('Account created successfully!');
                window.location.href = 'dashboard.html'; // Redirect to dashboard after signup
            } catch (error) {
                console.error('Error creating user:', error);
                let errorMessage = 'An error occurred during signup.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'An account with this email already exists.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password should be at least 6 characters.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Please enter a valid email.';
                }
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>
