<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
</head>
<body>
    <h1>404 - Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <p><a href="/">Go back to home</a></p>
    <script>
        // Redirect to home if accessing non-existent pages
        if (window.location.pathname !== '/' && !window.location.pathname.includes('.html') && !window.location.pathname.includes('.css') && !window.location.pathname.includes('.js') && !window.location.pathname.includes('.jpg') && !window.location.pathname.includes('.jpeg') && !window.location.pathname.includes('.png')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
